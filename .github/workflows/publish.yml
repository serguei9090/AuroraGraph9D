name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Push events matching v*, i.e. v1.0, v20.15.10

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      # We use Maturin Action to automatically build the Rust extension 
      # for the specific OS matrix environment (giving us cross-platform Linux, Mac, Windows wheels!).
      - uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        with:
          command: build
          args: --release --out dist
          
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Source Distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI via OIDC Trusted Publisher
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    # The environment matching the 'Environment name' set in PyPI pending publisher config
    environment: pypi
    permissions:
      # IMPORTANT: this permission is required for PyPI Trusted Publisher (OIDC) authentication
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
          
      - uses: actions/download-artifact@v4
        with:
          pattern: sdist
          merge-multiple: true
          path: dist

      # The official PyPA Action that securely grabs the OIDC token and uploads your package
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
