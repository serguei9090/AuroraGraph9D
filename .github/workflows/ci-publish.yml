name: CI & PyPI Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write   # Needed for trusted publishing to PyPI

jobs:
  # ------------------------------------------------------------------
  # 1. Run tests on every push / PR
  # ------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build + install the package (dev deps)
        run: uv sync --group dev

      - name: Build Rust extension in place
        run: uv run maturin develop --release

      - name: Run test suite with coverage
        run: uv run pytest --cov=auragraph --cov-report=xml tests/

      - name: Lint
        run: uv run ruff check .

  # ------------------------------------------------------------------
  # 2. Build manylinux / Windows / macOS wheels on every tag push
  # ------------------------------------------------------------------
  build-wheels:
    name: Build wheel (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels with Maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Build ABI3 wheels compatible with Python 3.11+
          args: --release --out dist --interpreter 3.11 3.12 3.13
          manylinux: auto

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  # ------------------------------------------------------------------
  # 3. Publish to PyPI (only on tag push after all builds pass)
  # ------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
